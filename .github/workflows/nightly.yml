name: Nightly integration tests

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC every day
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  test:
    name: pytest (CUDA)
    runs-on: [self-hosted, gpu]   # targets your DGX self-hosted runner
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -e ".[triton]" --quiet
          pip install pytest pytest-cov --quiet

      - name: Run integration tests
        run: |
          python -m pytest tests/ -v -p no:deepeval \
            --tb=short \
            --cov=torchembed \
            --cov-report=term-missing

      - name: GPU info
        if: always()
        run: nvidia-smi
